# config.yaml - 해외주식 자동매도 시스템 설정
# 기획서 v1.1 기준 (2025-10-24 업데이트)
# 모든 시간은 미국 동부시간(ET) 기준

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 1. API 설정
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
api:
  base_url: "https://openapi.koreainvestment.com:9443"
  websocket_url: "ws://ops.koreainvestment.com:21000"
  request_timeout: 15

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 2. 시스템 설정 (기획서 2장, 9장)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
system:
  # 기획서 2.2: 운영 시간 (ET 04:00-12:00 = 7시간)
  operating_hours:
    start: "04:00"  # 프리마켓 시작
    end: "12:00"    # 한국시간 오전 01:00 고정 (서머타임 무관)
    # 주의: ET 12:00 = 한국시간 01:00 (서머타임), 02:00 (표준시)
    # 슬립모드는 항상 한국시간 01:00에 진입
  
  # 기획서 2.3: 12:00에 자동 종료
  auto_shutdown: true
  graceful_shutdown_timeout: 30
  
  # 상태 파일 (기획서 7.1)
  state_file: "/tmp/auto-sell-order-state.json"
  
  # 토큰 관리
  token_refresh_margin_minutes: 5
  approval_margin_seconds: 1800
  
  # WebSocket 재연결 (기획서 5.2: 3회 재시도)
  max_reconnect_attempts: 3
  base_reconnect_delay: 10

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 3. 자동 매도 전략 (기획서 4장)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
order_settings:
  # 기획서 4.1: 수익률 3% 고정 (v2.0에서는 6.0%를 권장 - 필요시 6.0으로 수정하세요)
  # ⭐ 수정하려면 여기만 변경하고 시스템 재시작
  target_profit_rate: 6.0  # 단위: % (v2.0 기획서 4.1 기준 6.0%로 수정)
  
  # 기본 설정
  exchange_code: "NASD"
  order_type: "00"
  timezone: "US/Eastern"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 4. 스마트 폴링 전략 (기획서 3장)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# --- [수정된 부분 시작] ---
polling:
  # 기획서 3.1: 프리마켓 모드 (ET 04:00-09:30)
  premarket:
    time_ranges:
      - {start: "04:00", end: "09:30"}
    
    interval_seconds:
      uniform: 4   # 4초 폴링

  # 기획서 3.1: 정규장 모드 (ET 09:30-12:00) - REST 폴링 전환
  regular:
    time_ranges:
      - {start: "09:30", end: "09:40"}   # 시작 10분
      - {start: "09:40", end: "12:00"}   # 나머지 140분
    
    mode: "polling"  # WebSocket 포기, REST 폴링 사용
    
    interval_seconds:
      high_activity: 3   # 09:30-09:40 (10분)
      low_activity: 10   # 09:40-12:00 (140분)
# --- [수정된 부분 끝] ---

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 5. Rate Limit (기획서 5장)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
rate_limit:
  # 🔴 [v1.1 수정] REST API 제한 증가 (기획서 5.1)
  # 기존: 20회/초 → 신규: 50회/초 (150% 증가)
  # 안전 마진 75% 적용: 50 × 0.75 = 37.5 ≈ 37회
  requests_per_second: 37 # 안전 마진: 75% 활용
  min_request_interval: 0.028 # 1초 / 37회 ≈ 0.027초 (반올림 0.028)
  
  # 기획서 5.1: 일일/시간 제한 (변경 없음)
  daily_limit: 5000
  hourly_limit: 500
  
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 🔴 [v1.1 추가] 비상 중지 조건 (기획서 5.2)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  emergency_stop:
    daily_usage_threshold: 0.9  # 90% 도달 시 (4,500회)
    consecutive_errors: 10       # 연속 10회 오류
    no_response_timeout: 300     # 5분간 응답 없음
    websocket_subscription_insufficient: true  # [신규] WebSocket 구독 부족 시 경고
    # 보유 종목 > 20개 && subscription_strategy="all" 시 경고 알림
  
  # Rate Limit 초과 시 대기
  cooldown_seconds: 60

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 6. 텔레그램 알림 (기획서 6.1)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
telegram:
  # 알림 설정
  notifications:
    system_start_stop: true       # 시스템 시작/종료
    mode_change: true             # 프리마켓 ↔ 정규장
    buy_detected: true            # 매수 감지
    sell_success: true            # 매도 성공
    sell_failed: true             # 매도 실패
    errors: true                  # 오류 발생
    rate_limit_warning: true      # Rate Limit 90%
    daily_summary: true           # 일일 통계 (01:00 한국시간)
    websocket_subscription_warning: true  # [v1.1 신규] WebSocket 구독 부족 경고
  
  # 연결 설정
  polling_interval: 10
  error_polling_interval: 30
  timeout: 10

# 
# ↓↓↓ (v2.0 신규 섹션 추가) ↓↓↓
#

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 🆕 [v2.0 추가] 텔레그램 주문 시스템 (기획서 v2.0 섹션 5)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
telegram_orders:
  # 기본 설정
  enabled: true                  # 텔레그램 주문 시스템 활성화
  max_pending_orders: 6          # 최대 대기 주문 수 (기획서 5.3)
  
  # 목표가 감시 (기획서 5.4)
  monitor_interval: 10           # 목표가 감시 주기 (초)
  
  # 자동 매수 실행 (기획서 5.5)
  retry_attempts: 2              # 매수 재시도 횟수
  retry_delay: 5                 # 재시도 간격 (초)
  
  # 주문 상태 파일 (기획서 8.3)
  state_file: "telegram_orders.json"
  
  # 자금 설정 (기획서 5.2)
  ratio_based: true              # 비율 기반 주문 (true)
  # 또는 고정 금액 주문:
  # fixed_amount: 1000           # USD (ratio_based: false일 때)
  
  # 슬립 모드 처리 (기획서 7.4)
  cancel_on_sleep: true          # 슬립 모드 시 대기 주문 전체 취소

# 
# ↑↑↑ (v2.0 신규 섹션 추가 완료) ↑↑↑
#

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 7. 로깅 설정 (기획서 6.2)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  
  file:
    path: "logs/app.log"
    max_size_mb: 10
    backup_count: 5
    retention_days: 30
  
  # 콘솔 출력 설정
  console:
    enabled: true
    level: "INFO"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 8. 백업 설정 (기획서 7장)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
backup:
  # 기획서 7.1: 상태 파일 백업
  state_files:
    enabled: true
    path: "/home/ec2-user/backups/states/"
    retention_days: 7
    auto_backup_on_sell: true
    daily_backup_time: "01:00"  # 한국시간 (시스템 종료 시)
  
  # 기획서 7.2: 로그 파일 백업
  log_files:
    enabled: true
    path: "/home/ec2-user/backups/logs/"
    retention_days: 30
    compress: true

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 9. 오류 처리 (기획서 8장)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
error_handling:
  # 기획서 8.1: 오류 유형별 재시도
  network_error:
    max_retries: 3
    retry_delay: 10
  
  rate_limit_error:
    max_retries: 1
    retry_delay: 60
  
  auth_error:
    max_retries: 2
    retry_delay: 5
  
  # 기획서 4.4: 매도 실패 처리
  sell_failed:
    retry: false  # 즉시 포기
    log_only: true
    notify_telegram: true
  
  # 기획서 5.2: WebSocket 실패
  websocket_failed:
    action: "stop_system"  # 시스템 중지
    notify_telegram: true

# 
# ↓↓↓ [v3.0 신규 섹션] ↓↓↓
#

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 🆕 [v3.0 추가] 완전 자동매매 설정 (기획서 v3.0)
# 작성일: 2025-12-06
# 수정일: 2025-12-08 (enabled: true로 활성화)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
auto_trader:
  # 활성화 여부
  enabled: true  # ✅ v3.0 완전 자동매매 활성화
  
  # 랭킹 업데이트 설정
  ranking_update_interval: 3600  # 1시간 (초 단위)
  ranking_api:
    exchange: 'NAS'  # 거래소: NYS(뉴욕), NAS(나스닥), AMS(아멕스)
    volume_filter: '3'  # 거래량 필터: 3 = 10,000주 이상
  
  # 감시 목록 관리
  max_watch_list: 8  # 최대 감시 종목 수
  rank_out_threshold: 2  # N시간 연속 이탈 시 제거
  
  # 재진입 규칙
  allow_retry_after_skip: false  # 터치 후 못 산 종목 재기회 불가
  allow_reentry_after_exit: false  # 손절/익절 후 재진입 불가
  
  # 50MA 터치 조건
  ma_period: 50  # 50일 이동평균
  touch_threshold: 0.005  # ±0.5% 허용 범위
  bounce_required: true  # 반등 확인 필수
  volume_multiplier: 1.2  # 거래량 최소 배수
  
  # 손절/익절 설정
  stop_loss: -2.0  # 손절: -2%
  take_profit: 6.0  # 익절: +6%
  check_stop_first: true  # 손절 우선 체크
  
  # 일일 제한
  max_entries: 6  # 최대 진입 횟수
  max_exits: 6  # 최대 청산 횟수
  stop_after_limit: true  # 한도 도달 시 시스템 중지
  
  # 폴링 간격
  monitoring_interval: 4  # 50MA 체크 간격 (초)
  candle_update_interval: 60  # 1분봉 업데이트 간격 (초)
  
  # 로그 및 알림
  log_level: 'INFO'  # DEBUG, INFO, WARNING, ERROR
  telegram_alerts: true  # 텔레그램 알림 활성화

# 
# ↑↑↑ [v3.0 신규 섹션 추가 완료] ↑↑↑
#

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 📝 변경 이력
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# v3.0.1 (2025-12-08)
# - auto_trader.enabled: false → true (v3.0 활성화)
#
# v3.0 (2025-12-06)
# - 완전 자동매매 시스템 설정 추가
# - 50MA 터치 전략 설정
# - 일일 진입/청산 제한 설정
#
# v1.1 (2025-10-24)
# - WebSocket 구독 20건 제한 반영
# - REST API 50건/초로 증가 (requests_per_second: 15 → 37)
# - 무료 실시간 시세 정책 반영
# - 비상 종지 조건 추가 (websocket_subscription_insufficient)
# - 텔레그램 알림 추가 (websocket_subscription_warning)